  <title id="logoTitle">Eavora logo</title>
  <desc id="logoDesc">Premium Eavora logo with an orange pipe icon and white wordmark for a dark background.</desc>

  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FF7A00" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g transform="translate(18,20)" filter="url(#softGlow)">
    <rect x="66" y="0" width="112" height="34" rx="17" fill="#FFFFFF" stroke="#FF7A00" stroke-width="10"/>
    <rect x="90" y="30" width="64" height="58" rx="10" fill="#FF7A00"/>
    <rect x="102" y="58" width="40" height="9" rx="4.5" fill="#FFFFFF"/>
    <rect x="40" y="84" width="164" height="58" rx="14" fill="#FF7A00"/>
    <rect x="18" y="70" width="36" height="86" rx="18" fill="#FFFFFF" stroke="#FF7A00" stroke-width="10"/>
    <rect x="190" y="70" width="36" height="86" rx="18" fill="#FFFFFF" stroke="#FF7A00" stroke-width="10"/>
    <path d="M78 142 Q122 188 166 142 Z" fill="#FF7A00"/>
    <path d="M48 94 H196" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="4" stroke-linecap="round"/>
